<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Kebi Library — Empty State</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --bg: #FAFAF9;
    --surface: #F1F1EF;
    --surface-2: #E8E8E5;
    --text: #1A1A1A;
    --text-muted: #8A8A87;
    --text-soft: #B5B5B1;
  }

  html, body {
    background: #2A2A28;
    font-family: 'Inter', system-ui, sans-serif;
    -webkit-font-smoothing: antialiased;
    min-height: 100vh;
    display: flex;
    align-items: center;
    justify-content: center;
    padding: 40px 16px;
  }

  .phone {
    width: 390px;
    height: 844px;
    background: var(--bg);
    border-radius: 48px;
    overflow: hidden;
    position: relative;
    box-shadow: 0 0 0 12px #111, 0 0 0 14px #2A2A28, 0 40px 80px rgba(0,0,0,0.5);
    display: flex;
    flex-direction: column;
  }

  .status-bar { height: 50px; padding: 18px 32px 0; display: flex; justify-content: space-between; align-items: center; font-size: 15px; font-weight: 600; color: var(--text); flex-shrink: 0; }
  .status-right { display: flex; gap: 6px; align-items: center; }

  .top-bar { padding: 12px 16px 8px; display: flex; justify-content: space-between; align-items: center; flex-shrink: 0; }

  .icon-btn { width: 40px; height: 40px; border-radius: 50%; background: var(--surface); display: flex; align-items: center; justify-content: center; border: none; cursor: pointer; }
  .icon-btn svg { width: 18px; height: 18px; stroke: var(--text); stroke-width: 1.8; fill: none; }

  .top-pill { display: flex; align-items: center; background: var(--surface); border-radius: 999px; padding: 0 4px; }
  .top-pill button { width: 40px; height: 40px; border-radius: 50%; background: transparent; border: none; display: flex; align-items: center; justify-content: center; cursor: pointer; flex-shrink: 0; }
  .top-pill svg { width: 18px; height: 18px; stroke: var(--text); stroke-width: 1.8; fill: none; }

  /* The save icon pulses a soft ring so the empty state directs the user
     to the save trigger that already lives in the pill — no extra button. */
  .save-ring { position: relative; }
  .save-ring::after {
    content: '';
    position: absolute;
    inset: 4px;
    border-radius: 50%;
    border: 2px solid var(--text);
    opacity: 0;
    animation: ring 2.2s ease-out infinite;
  }
  @keyframes ring {
    0%   { transform: scale(0.7); opacity: 0.5; }
    70%  { transform: scale(1.5); opacity: 0; }
    100% { transform: scale(1.5); opacity: 0; }
  }

  .empty { flex: 1; display: flex; flex-direction: column; padding: 8px 24px 16px; min-height: 0; }
  .eyebrow { font-size: 11px; font-weight: 600; color: var(--text-soft); text-transform: uppercase; letter-spacing: 0.08em; margin-top: 4px; }

  .empty-center { flex: 1; display: flex; flex-direction: column; align-items: center; justify-content: center; gap: 18px; text-align: center; padding-bottom: 24px; }

  .mascot { display: block; animation: breathe 3.2s ease-in-out infinite; transform-origin: 50% 60%; }
  @keyframes breathe { 0%, 100% { transform: scale(1); } 50% { transform: scale(1.045); } }

  .empty-title { font-size: 26px; font-weight: 700; color: var(--text); letter-spacing: -0.025em; line-height: 1.1; }

  .cue-hint { font-size: 14px; color: var(--text-muted); line-height: 1.45; letter-spacing: -0.005em; max-width: 268px; }
  .cue-hint strong { color: var(--text); font-weight: 600; }
  .cue-hint .ico { display: inline-flex; vertical-align: -3px; margin: 0 1px; }
  .cue-hint .ico svg { width: 15px; height: 15px; stroke: var(--text); stroke-width: 1.9; fill: none; }

  .tab-bar { margin: 8px 16px 12px; display: flex; align-items: center; justify-content: flex-end; flex-shrink: 0; }
  .kebi-ai-btn { width: 56px; height: 56px; border-radius: 50%; background: white; border: 1px solid var(--surface-2); display: flex; align-items: center; justify-content: center; cursor: pointer; }
  .kebi-ai-btn svg { width: 36px; height: 36px; }
  .home-indicator { width: 134px; height: 5px; background: var(--text); border-radius: 3px; margin: 4px auto 8px; flex-shrink: 0; }
</style>
</head>
<body>

<div class="phone">

  <div class="status-bar">
    <span>9:41</span>
    <div class="status-right">
      <svg width="17" height="11" viewBox="0 0 17 11" fill="currentColor"><path d="M1 7h2v3H1zM5 5h2v5H5zM9 3h2v7H9zM13 1h2v9h-2z"/></svg>
      <svg width="15" height="11" viewBox="0 0 15 11" fill="currentColor"><path d="M7.5 2C9.7 2 11.7 2.8 13.3 4.2L14.5 3C12.6 1.2 10.1.2 7.5.2S2.4 1.2.5 3l1.2 1.2C3.3 2.8 5.3 2 7.5 2zM7.5 5.5c1.4 0 2.7.5 3.7 1.4l1.2-1.2c-1.4-1.3-3.2-2-5-2s-3.6.7-5 2l1.2 1.2c1-.9 2.3-1.4 3.7-1.4z"/></svg>
      <svg width="24" height="11" viewBox="0 0 24 11" fill="none"><rect x="0.5" y="0.5" width="20" height="10" rx="2.5" stroke="currentColor"/><rect x="2" y="2" width="17" height="7" rx="1" fill="currentColor"/><rect x="21" y="3.5" width="1.5" height="4" rx="0.5" fill="currentColor"/></svg>
    </div>
  </div>

  <div class="top-bar">
    <button class="icon-btn" aria-label="back"><svg viewBox="0 0 24 24"><polyline points="15 6 9 12 15 18"/></svg></button>
    <div class="top-pill">
      <button aria-label="search"><svg viewBox="0 0 24 24"><circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/></svg></button>
      <button class="save-ring" aria-label="save a place"><svg viewBox="0 0 24 24"><path d="M19 21l-7-5-7 5V5a2 2 0 012-2h10a2 2 0 012 2z"/></svg></button>
    </div>
  </div>

  <div class="empty">
    <div class="eyebrow">your stash</div>
    <div class="empty-center">
      <svg class="mascot" width="88" height="88" viewBox="0 0 64 64">
        <ellipse cx="32" cy="38" rx="20" ry="20" fill="#D4B891"/>
        <ellipse cx="32" cy="42" rx="13" ry="13" fill="#F5EBD3"/>
        <ellipse cx="13" cy="34" rx="3.5" ry="6" fill="#A89070" transform="rotate(-25 13 34)"/>
        <ellipse cx="51" cy="34" rx="3.5" ry="6" fill="#A89070" transform="rotate(25 51 34)"/>
        <ellipse cx="22" cy="36" rx="3" ry="2" fill="#E8B894" opacity="0.6"/>
        <ellipse cx="42" cy="36" rx="3" ry="2" fill="#E8B894" opacity="0.6"/>
        <circle cx="25" cy="30" r="3.5" fill="white"/>
        <circle cx="39" cy="30" r="3.5" fill="white"/>
        <circle cx="25" cy="30" r="1.7" fill="#1A1A1A"/>
        <circle cx="39" cy="30" r="1.7" fill="#1A1A1A"/>
        <circle cx="25.6" cy="29.4" r="0.6" fill="white"/>
        <circle cx="39.6" cy="29.4" r="0.6" fill="white"/>
        <path d="M30 33 L34 33 L32 36 Z" fill="#C87A4A"/>
        <path d="M30 14 Q32 10 34 14" stroke="#8B7355" stroke-width="1.6" fill="none" stroke-linecap="round"/>
      </svg>
      <div class="empty-title">your stash is empty</div>
      <div class="cue-hint">tap the <strong>bookmark</strong> <span class="ico"><svg viewBox="0 0 24 24"><path d="M19 21l-7-5-7 5V5a2 2 0 012-2h10a2 2 0 012 2z"/></svg></span> up top to save your first place. paste a link or just name it.</div>
    </div>
  </div>

  <div class="tab-bar">
    <button class="kebi-ai-btn" aria-label="ask kebi">
      <svg viewBox="0 0 64 64"><ellipse cx="32" cy="38" rx="20" ry="20" fill="#D4B891"/><ellipse cx="32" cy="42" rx="13" ry="13" fill="#F5EBD3"/><ellipse cx="13" cy="34" rx="3.5" ry="6" fill="#A89070" transform="rotate(-25 13 34)"/><ellipse cx="51" cy="34" rx="3.5" ry="6" fill="#A89070" transform="rotate(25 51 34)"/><ellipse cx="22" cy="36" rx="3" ry="2" fill="#E8B894" opacity="0.6"/><ellipse cx="42" cy="36" rx="3" ry="2" fill="#E8B894" opacity="0.6"/><circle cx="25" cy="30" r="3.5" fill="white"/><circle cx="39" cy="30" r="3.5" fill="white"/><circle cx="25" cy="30" r="1.7" fill="#1A1A1A"/><circle cx="39" cy="30" r="1.7" fill="#1A1A1A"/><circle cx="25.6" cy="29.4" r="0.6" fill="white"/><circle cx="39.6" cy="29.4" r="0.6" fill="white"/><path d="M30 33 L34 33 L32 36 Z" fill="#C87A4A"/><path d="M30 14 Q32 10 34 14" stroke="#8B7355" stroke-width="1.6" fill="none" stroke-linecap="round"/></svg>
    </button>
  </div>

  <div class="home-indicator"></div>

</div>

</body>
</html>
