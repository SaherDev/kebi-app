<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Kebi Loading — Reusable</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --bg: #FAFAF9;
    --surface: #F1F1EF;
    --surface-2: #E8E8E5;
    --text: #1A1A1A;
    --text-muted: #8A8A87;
    --text-soft: #B5B5B1;
  }

  html, body {
    background: #2A2A28;
    font-family: 'Inter', system-ui, sans-serif;
    -webkit-font-smoothing: antialiased;
    min-height: 100vh;
    display: flex;
    align-items: center;
    justify-content: center;
    padding: 40px 16px;
  }

  .phone {
    width: 390px;
    height: 844px;
    background: var(--bg);
    border-radius: 48px;
    overflow: hidden;
    position: relative;
    box-shadow: 0 0 0 12px #111, 0 0 0 14px #2A2A28, 0 40px 80px rgba(0,0,0,0.5);
    display: flex;
    flex-direction: column;
  }

  .status-bar {
    height: 50px;
    padding: 18px 32px 0;
    display: flex;
    justify-content: space-between;
    align-items: center;
    font-size: 15px;
    font-weight: 600;
    color: var(--text);
    flex-shrink: 0;
    z-index: 2;
  }

  .status-right { display: flex; gap: 6px; align-items: center; }

  .loading-screen {
    flex: 1;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    gap: 28px;
    padding: 32px;
    position: relative;
  }

  /* Mascot — simple breathing scale + eye blink loop, no entrance animation */
  .mascot-wrap {
    position: relative;
    width: 110px;
    height: 110px;
    display: flex;
    align-items: center;
    justify-content: center;
  }

  .mascot {
    width: 110px;
    height: 110px;
    animation: breathe 2.4s ease-in-out infinite;
  }

  /* Soft pulse ring behind mascot — visualizes "working" */
  .pulse-ring {
    position: absolute;
    inset: -10px;
    border-radius: 50%;
    border: 1.5px solid var(--surface-2);
    opacity: 0;
    animation: pulse 2.4s ease-out infinite;
  }

  .pulse-ring.delayed {
    animation-delay: 1.2s;
  }

  .eye-pupil {
    transform-origin: center;
    animation: blink 4s ease-in-out 1s infinite;
  }

  /* Status copy */
  .status-text {
    font-size: 15px;
    color: var(--text-muted);
    letter-spacing: -0.005em;
    text-align: center;
    line-height: 1.5;
    max-width: 260px;
    min-height: 22px;
  }

  .status-text .verb {
    color: var(--text);
    font-weight: 500;
  }

  /* Tiny progress indicator — 3 dots that fill sequentially */
  .progress {
    display: flex;
    gap: 8px;
    align-items: center;
  }

  .progress .dot {
    width: 6px;
    height: 6px;
    border-radius: 50%;
    background: var(--surface-2);
    transition: background 200ms ease-out, transform 200ms ease-out;
  }

  .progress .dot.on {
    background: var(--text);
    transform: scale(1.2);
  }

  /* Long wait reassurance — fades in after ~5s */
  .reassure {
    position: absolute;
    bottom: 80px;
    left: 50%;
    transform: translateX(-50%);
    font-size: 12px;
    color: var(--text-soft);
    letter-spacing: -0.005em;
    opacity: 0;
    text-align: center;
    max-width: 280px;
  }

  .reassure.visible {
    animation: reassure-in 400ms ease-out forwards;
  }

  /* Cancel button — only appears on very long waits (>15s) */
  .cancel-btn {
    position: absolute;
    bottom: 40px;
    left: 50%;
    transform: translateX(-50%);
    background: transparent;
    border: none;
    font-family: inherit;
    font-size: 13px;
    color: var(--text-muted);
    text-decoration: underline;
    cursor: pointer;
    letter-spacing: -0.005em;
    opacity: 0;
    pointer-events: none;
    transition: opacity 300ms ease-out;
  }

  .cancel-btn.visible {
    opacity: 1;
    pointer-events: auto;
  }

  .home-indicator {
    position: absolute;
    bottom: 8px;
    left: 50%;
    transform: translateX(-50%);
    width: 134px;
    height: 5px;
    background: var(--text);
    border-radius: 3px;
    z-index: 2;
  }

  /* Animations */
  @keyframes breathe {
    0%, 100% { transform: scale(1) translateY(0); }
    50% { transform: scale(1.02) translateY(-2px); }
  }

  @keyframes pulse {
    0% { transform: scale(0.85); opacity: 0.6; }
    100% { transform: scale(1.4); opacity: 0; }
  }

  @keyframes blink {
    0%, 92%, 96%, 100% { transform: scaleY(1); }
    94% { transform: scaleY(0.1); }
  }

  @keyframes reassure-in {
    to { opacity: 1; }
  }
</style>
</head>
<body>

<div class="phone">
  <div class="status-bar">
    <span>9:41</span>
    <div class="status-right">
      <svg width="17" height="11" viewBox="0 0 17 11" fill="currentColor"><path d="M1 7h2v3H1zM5 5h2v5H5zM9 3h2v7H9zM13 1h2v9h-2z"/></svg>
      <svg width="15" height="11" viewBox="0 0 15 11" fill="currentColor"><path d="M7.5 2C9.7 2 11.7 2.8 13.3 4.2L14.5 3C12.6 1.2 10.1.2 7.5.2S2.4 1.2.5 3l1.2 1.2C3.3 2.8 5.3 2 7.5 2zM7.5 5.5c1.4 0 2.7.5 3.7 1.4l1.2-1.2c-1.4-1.3-3.2-2-5-2s-3.6.7-5 2l1.2 1.2c1-.9 2.3-1.4 3.7-1.4z"/></svg>
      <svg width="24" height="11" viewBox="0 0 24 11" fill="none"><rect x="0.5" y="0.5" width="20" height="10" rx="2.5" stroke="currentColor"/><rect x="2" y="2" width="17" height="7" rx="1" fill="currentColor"/><rect x="21" y="3.5" width="1.5" height="4" rx="0.5" fill="currentColor"/></svg>
    </div>
  </div>

  <div class="loading-screen">

    <div class="mascot-wrap">
      <span class="pulse-ring"></span>
      <span class="pulse-ring delayed"></span>
      <svg class="mascot" viewBox="0 0 64 64" xmlns="http://www.w3.org/2000/svg">
        <ellipse cx="32" cy="38" rx="20" ry="20" fill="#D4B891"/>
        <ellipse cx="32" cy="42" rx="13" ry="13" fill="#F5EBD3"/>
        <ellipse cx="13" cy="34" rx="3.5" ry="6" fill="#A89070" transform="rotate(-25 13 34)"/>
        <ellipse cx="51" cy="34" rx="3.5" ry="6" fill="#A89070" transform="rotate(25 51 34)"/>
        <ellipse cx="22" cy="36" rx="3" ry="2" fill="#E8B894" opacity="0.6"/>
        <ellipse cx="42" cy="36" rx="3" ry="2" fill="#E8B894" opacity="0.6"/>
        <circle cx="25" cy="30" r="3.5" fill="white"/>
        <circle cx="39" cy="30" r="3.5" fill="white"/>
        <circle cx="25" cy="30" r="1.7" fill="#1A1A1A"/>
        <circle cx="39" cy="30" r="1.7" fill="#1A1A1A"/>
        <circle cx="25.6" cy="29.4" r="0.6" fill="white"/>
        <circle cx="39.6" cy="29.4" r="0.6" fill="white"/>
        <path d="M30 33 L34 33 L32 36 Z" fill="#C87A4A"/>
        <path d="M30 14 Q32 10 34 14" stroke="#8B7355" stroke-width="1.6" fill="none" stroke-linecap="round"/>
      </svg>
    </div>

    <div class="status-text" id="status-text">
      <span class="verb">getting your stash...</span>
    </div>

    <div class="progress" id="progress">
      <span class="dot on"></span>
      <span class="dot"></span>
      <span class="dot"></span>
    </div>

    <div class="reassure" id="reassure">
      taking a sec — kebi's brain is warming up.
    </div>

    <button class="cancel-btn" id="cancel-btn">cancel</button>

    <div class="home-indicator"></div>

  </div>
</div>

<script>
  // Cycle status text + progress dots so users see motion through the wait.
  // Replace these with real backend events when wired.
  const messages = [
    'getting your stash...',
    'loading your taste...',
    'almost there...',
  ];

  const statusEl = document.getElementById('status-text');
  const dots = document.querySelectorAll('#progress .dot');
  let i = 0;

  setInterval(() => {
    i = (i + 1) % messages.length;
    statusEl.innerHTML = `<span class="verb">${messages[i]}</span>`;
    dots.forEach((d, idx) => d.classList.toggle('on', idx <= i));
  }, 1800);

  // Reassurance copy fades in if loading takes longer than 5s
  setTimeout(() => {
    document.getElementById('reassure').classList.add('visible');
  }, 5000);

  // Cancel button appears if loading takes longer than 15s — escape hatch
  setTimeout(() => {
    document.getElementById('cancel-btn').classList.add('visible');
  }, 15000);
</script>

</body>
</html>
