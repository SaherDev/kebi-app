<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Kebi Login — Linear Style</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --bg: #FAFAF9;
    --surface: #F1F1EF;
    --surface-2: #E8E8E5;
    --text: #1A1A1A;
    --text-muted: #8A8A87;
    --text-soft: #B5B5B1;
  }

  html, body {
    background: #2A2A28;
    font-family: 'Inter', system-ui, sans-serif;
    -webkit-font-smoothing: antialiased;
    min-height: 100vh;
    display: flex;
    align-items: center;
    justify-content: center;
    padding: 40px 16px;
  }

  .phone {
    width: 390px;
    height: 844px;
    background: var(--bg);
    border-radius: 48px;
    overflow: hidden;
    position: relative;
    box-shadow: 0 0 0 12px #111, 0 0 0 14px #2A2A28, 0 40px 80px rgba(0,0,0,0.5);
    display: flex;
    flex-direction: column;
  }

  .status-bar {
    height: 50px;
    padding: 18px 32px 0;
    display: flex;
    justify-content: space-between;
    align-items: center;
    font-size: 15px;
    font-weight: 600;
    color: var(--text);
    flex-shrink: 0;
  }

  .status-right { display: flex; gap: 6px; align-items: center; }

  .scroll {
    flex: 1;
    overflow-y: auto;
    padding: 40px 32px 24px;
    display: flex;
    flex-direction: column;
    gap: 32px;
  }

  .scroll::-webkit-scrollbar { display: none; }

  .brand {
    display: flex;
    flex-direction: column;
    gap: 16px;
    margin-top: 24px;
  }

  .brand-mark {
    width: 88px;
    height: 88px;
    display: flex;
    align-items: center;
    justify-content: center;
  }

  .brand-mark svg {
    width: 100%;
    height: 100%;
  }

  .brand-name {
    font-size: 44px;
    font-weight: 700;
    color: var(--text);
    letter-spacing: -0.035em;
    line-height: 1;
  }

  .turn {
    display: flex;
    flex-direction: column;
    gap: 8px;
  }

  .turn-label {
    font-size: 11px;
    font-weight: 600;
    color: var(--text-soft);
    text-transform: uppercase;
    letter-spacing: 0.08em;
  }

  .turn-text {
    font-size: 19px;
    color: var(--text);
    line-height: 1.45;
    letter-spacing: -0.015em;
  }

  .turn-text .muted {
    color: var(--text-muted);
  }

  .auth-group {
    background: var(--surface);
    border-radius: 14px;
    padding: 6px;
    display: flex;
    flex-direction: column;
    gap: 4px;
  }

  .auth-btn {
    display: flex;
    align-items: center;
    gap: 12px;
    padding: 14px 16px;
    background: var(--bg);
    border: none;
    border-radius: 10px;
    font-family: inherit;
    font-size: 15px;
    font-weight: 600;
    color: var(--text);
    letter-spacing: -0.01em;
    cursor: pointer;
    text-align: left;
    transition: background 120ms ease-out;
  }

  .auth-btn:hover { background: white; }

  .auth-btn svg, .auth-btn img {
    width: 18px;
    height: 18px;
    flex-shrink: 0;
  }

  .auth-btn .arrow {
    margin-left: auto;
    width: 14px;
    height: 14px;
    stroke: var(--text-soft);
    stroke-width: 2;
    fill: none;
  }

  .auth-divider {
    display: flex;
    align-items: center;
    gap: 12px;
    color: var(--text-soft);
    font-size: 11px;
    font-weight: 600;
    letter-spacing: 0.08em;
    text-transform: uppercase;
  }

  .auth-divider::before,
  .auth-divider::after {
    content: '';
    flex: 1;
    height: 1px;
    background: var(--surface-2);
  }

  .email-row {
    display: flex;
    flex-direction: column;
    gap: 8px;
  }

  .input-wrap {
    background: var(--surface);
    border-radius: 12px;
    padding: 14px 16px 12px;
    display: flex;
    flex-direction: column;
    gap: 8px;
  }

  .email-input {
    background: transparent;
    border: none;
    padding: 0;
    font-family: inherit;
    font-size: 15px;
    color: var(--text);
    letter-spacing: -0.005em;
    outline: none;
    width: 100%;
  }

  .email-input::placeholder { color: var(--text-muted); }

  .input-meta {
    display: flex;
    align-items: center;
    gap: 6px;
    font-size: 11px;
    color: var(--text-muted);
    letter-spacing: -0.005em;
    padding-top: 8px;
    border-top: 1px solid var(--surface-2);
  }

  .input-meta svg {
    width: 11px;
    height: 11px;
    stroke: var(--text-muted);
    stroke-width: 1.8;
    fill: none;
    flex-shrink: 0;
  }

  .send-code {
    background: var(--text);
    color: var(--bg);
    border: none;
    border-radius: 12px;
    padding: 14px 16px;
    font-family: inherit;
    font-size: 15px;
    font-weight: 600;
    letter-spacing: -0.01em;
    cursor: pointer;
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 8px;
  }

  .send-code svg {
    width: 14px;
    height: 14px;
    stroke: var(--bg);
    stroke-width: 2;
    fill: none;
  }

  .legal {
    font-size: 12px;
    color: var(--text-muted);
    line-height: 1.5;
    letter-spacing: -0.005em;
    text-align: center;
  }

  .legal a {
    color: var(--text);
    text-decoration: underline;
    text-decoration-color: var(--text-soft);
    text-underline-offset: 2px;
  }

  .home-indicator {
    width: 134px;
    height: 5px;
    background: var(--text);
    border-radius: 3px;
    margin: 12px auto 8px;
    flex-shrink: 0;
  }
</style>
</head>
<body>

<div class="phone">

  <div class="status-bar">
    <span>9:41</span>
    <div class="status-right">
      <svg width="17" height="11" viewBox="0 0 17 11" fill="currentColor"><path d="M1 7h2v3H1zM5 5h2v5H5zM9 3h2v7H9zM13 1h2v9h-2z"/></svg>
      <svg width="15" height="11" viewBox="0 0 15 11" fill="currentColor"><path d="M7.5 2C9.7 2 11.7 2.8 13.3 4.2L14.5 3C12.6 1.2 10.1.2 7.5.2S2.4 1.2.5 3l1.2 1.2C3.3 2.8 5.3 2 7.5 2zM7.5 5.5c1.4 0 2.7.5 3.7 1.4l1.2-1.2c-1.4-1.3-3.2-2-5-2s-3.6.7-5 2l1.2 1.2c1-.9 2.3-1.4 3.7-1.4z"/></svg>
      <svg width="24" height="11" viewBox="0 0 24 11" fill="none"><rect x="0.5" y="0.5" width="20" height="10" rx="2.5" stroke="currentColor"/><rect x="2" y="2" width="17" height="7" rx="1" fill="currentColor"/><rect x="21" y="3.5" width="1.5" height="4" rx="0.5" fill="currentColor"/></svg>
    </div>
  </div>

  <div class="scroll">

    <div class="brand">
      <div class="brand-mark">
        <svg viewBox="0 0 64 64" xmlns="http://www.w3.org/2000/svg">
          <ellipse cx="32" cy="38" rx="20" ry="20" fill="#D4B891"/>
        <ellipse cx="32" cy="42" rx="13" ry="13" fill="#F5EBD3"/>
        <ellipse cx="13" cy="34" rx="3.5" ry="6" fill="#A89070" transform="rotate(-25 13 34)"/>
        <ellipse cx="51" cy="34" rx="3.5" ry="6" fill="#A89070" transform="rotate(25 51 34)"/>
        <ellipse cx="22" cy="36" rx="3" ry="2" fill="#E8B894" opacity="0.6"/>
        <ellipse cx="42" cy="36" rx="3" ry="2" fill="#E8B894" opacity="0.6"/>
        <circle cx="25" cy="30" r="3.5" fill="white"/>
        <circle cx="39" cy="30" r="3.5" fill="white"/>
        <circle cx="25" cy="30" r="1.7" fill="#1A1A1A"/>
        <circle cx="39" cy="30" r="1.7" fill="#1A1A1A"/>
        <circle cx="25.6" cy="29.4" r="0.6" fill="white"/>
        <circle cx="39.6" cy="29.4" r="0.6" fill="white"/>
        <path d="M30 33 L34 33 L32 36 Z" fill="#C87A4A"/>
        <path d="M30 14 Q32 10 34 14" stroke="#8B7355" stroke-width="1.6" fill="none" stroke-linecap="round"/>
        </svg>
      </div>
      <h1 class="brand-name">Kebi</h1>
    </div>

    <div class="turn">
      <div class="turn-label">kebi</div>
      <div class="turn-text">
        save places from tiktok, instagram, wherever. tell me what you want — i find the match. <span class="muted">no filter panels. one answer. learns your taste.</span>
      </div>
    </div>

    <div class="auth-group">
      <button class="auth-btn">
        <svg viewBox="0 0 24 24"><path d="M22.56 12.25c0-.78-.07-1.53-.2-2.25H12v4.26h5.92c-.26 1.37-1.04 2.53-2.21 3.31v2.77h3.57c2.08-1.92 3.28-4.74 3.28-8.09z" fill="#4285F4"/><path d="M12 23c2.97 0 5.46-.98 7.28-2.66l-3.57-2.77c-.98.66-2.23 1.06-3.71 1.06-2.86 0-5.29-1.93-6.16-4.53H2.18v2.84A11 11 0 0012 23z" fill="#34A853"/><path d="M5.84 14.09c-.22-.66-.35-1.36-.35-2.09 0-.73.13-1.43.35-2.09V7.07H2.18A11 11 0 001 12c0 1.77.43 3.45 1.18 4.93l2.85-2.22.81-.62z" fill="#FBBC05"/><path d="M12 5.38c1.62 0 3.06.56 4.21 1.64l3.15-3.15C17.45 2.09 14.97 1 12 1 7.7 1 3.99 3.47 2.18 7.07l3.66 2.84c.87-2.6 3.3-4.53 6.16-4.53z" fill="#EA4335"/></svg>
        continue with google
        <svg class="arrow" viewBox="0 0 24 24"><polyline points="9 6 15 12 9 18"/></svg>
      </button>
      <button class="auth-btn">
        <svg viewBox="0 0 24 24" fill="currentColor"><path d="M17.05 20.28c-.98.95-2.05.8-3.08.35-1.09-.46-2.09-.48-3.24 0-1.44.62-2.2.44-3.06-.35C2.79 15.25 3.51 7.59 9.05 7.31c1.35.07 2.29.74 3.08.8 1.18-.24 2.31-.93 3.57-.84 1.51.12 2.65.72 3.4 1.8-3.12 1.87-2.38 5.98.48 7.13-.57 1.5-1.31 2.99-2.54 4.09zM12 7.25c-.15-2.23 1.66-4.07 3.74-4.25.29 2.58-2.34 4.5-3.74 4.25z"/></svg>
        continue with apple
        <svg class="arrow" viewBox="0 0 24 24"><polyline points="9 6 15 12 9 18"/></svg>
      </button>
    </div>

    <div class="auth-divider">or</div>

    <div class="email-row">
      <div class="input-wrap">
        <input type="text" class="email-input" placeholder="email or phone number" value="saher@kebi.app" inputmode="email" />
        <div class="input-meta">
          <svg viewBox="0 0 24 24"><path d="M4 4h16c1.1 0 2 .9 2 2v12c0 1.1-.9 2-2 2H4c-1.1 0-2-.9-2-2V6c0-1.1.9-2 2-2z"/><polyline points="22 6 12 13 2 6"/></svg>
          looks like an email
        </div>
      </div>
      <button class="send-code">
        send me a code
        <svg viewBox="0 0 24 24"><line x1="5" y1="12" x2="19" y2="12"/><polyline points="12 5 19 12 12 19"/></svg>
      </button>
    </div>

    <div class="legal">
      by continuing you agree to the <a href="#">terms</a> and <a href="#">privacy</a>
    </div>

  </div>

  <div class="home-indicator"></div>

</div>

</body>
</html>
