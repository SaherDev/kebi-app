<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Kebi Login — Linear Style</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --bg: #13110F;
    --surface: #1C1A17;
    --surface-2: #26231F;
    --text: #F5F1EA;
    --text-muted: #9A938A;
    --text-soft: #6E6862;
  }

  html, body {
    background: #0A0908;
    font-family: 'Inter', system-ui, sans-serif;
    -webkit-font-smoothing: antialiased;
    min-height: 100vh;
    display: flex;
    align-items: center;
    justify-content: center;
    padding: 40px 16px;
  }

  .phone {
    width: 390px;
    height: 844px;
    background: var(--bg);
    border-radius: 48px;
    overflow: hidden;
    position: relative;
    box-shadow: 0 0 0 12px #000, 0 0 0 14px #0A0908, 0 40px 80px rgba(0,0,0,0.5);
    display: flex;
    flex-direction: column;
  }

  .status-bar {
    height: 50px;
    padding: 18px 32px 0;
    display: flex;
    justify-content: space-between;
    align-items: center;
    font-size: 15px;
    font-weight: 600;
    color: var(--text);
    flex-shrink: 0;
  }

  .status-right { display: flex; gap: 6px; align-items: center; }

  .scroll {
    flex: 1;
    overflow-y: auto;
    padding: 40px 32px 24px;
    display: flex;
    flex-direction: column;
    gap: 32px;
  }

  .scroll::-webkit-scrollbar { display: none; }

  .brand {
    display: flex;
    flex-direction: column;
    gap: 16px;
    margin-top: 24px;
  }

  .brand-mark {
    width: 88px;
    height: 88px;
    display: flex;
    align-items: center;
    justify-content: center;
  }

  .brand-mark svg {
    width: 100%;
    height: 100%;
  }

  .brand-name {
    font-size: 44px;
    font-weight: 700;
    color: var(--text);
    letter-spacing: -0.035em;
    line-height: 1;
  }

  .turn {
    display: flex;
    flex-direction: column;
    gap: 8px;
  }

  .turn-label {
    font-size: 11px;
    font-weight: 600;
    color: var(--text-soft);
    text-transform: uppercase;
    letter-spacing: 0.08em;
  }

  .turn-text {
    font-size: 19px;
    color: var(--text);
    line-height: 1.45;
    letter-spacing: -0.015em;
  }

  .turn-text .muted {
    color: var(--text-muted);
  }

  .auth-group {
    background: var(--surface);
    border-radius: 14px;
    padding: 6px;
    display: flex;
    flex-direction: column;
    gap: 4px;
  }

  .auth-btn {
    display: flex;
    align-items: center;
    gap: 12px;
    padding: 14px 16px;
    background: var(--bg);
    border: none;
    border-radius: 10px;
    font-family: inherit;
    font-size: 15px;
    font-weight: 600;
    color: var(--text);
    letter-spacing: -0.01em;
    cursor: pointer;
    text-align: left;
    transition: background 120ms ease-out;
  }

  .auth-btn:hover { background: white; }

  .auth-btn svg, .auth-btn img {
    width: 18px;
    height: 18px;
    flex-shrink: 0;
  }

  .auth-btn .arrow {
    margin-left: auto;
    width: 14px;
    height: 14px;
    stroke: var(--text-soft);
    stroke-width: 2;
    fill: none;
  }

  .auth-divider {
    display: flex;
    align-items: center;
    gap: 12px;
    color: var(--text-soft);
    font-size: 11px;
    font-weight: 600;
    letter-spacing: 0.08em;
    text-transform: uppercase;
  }

  .auth-divider::before,
  .auth-divider::after {
    content: '';
    flex: 1;
    height: 1px;
    background: var(--surface-2);
  }

  .email-row {
    display: flex;
    flex-direction: column;
    gap: 8px;
  }

  .input-wrap {
    background: var(--surface);
    border-radius: 12px;
    padding: 14px 16px 12px;
    display: flex;
    flex-direction: column;
    gap: 8px;
  }

  .email-input {
    background: transparent;
    border: none;
    padding: 0;
    font-family: inherit;
    font-size: 15px;
    color: var(--text);
    letter-spacing: -0.005em;
    outline: none;
    width: 100%;
  }

  .email-input::placeholder { color: var(--text-muted); }

  .input-meta {
    display: flex;
    align-items: center;
    gap: 6px;
    font-size: 11px;
    color: var(--text-muted);
    letter-spacing: -0.005em;
    padding-top: 8px;
    border-top: 1px solid var(--surface-2);
  }

  .input-meta svg {
    width: 11px;
    height: 11px;
    stroke: var(--text-muted);
    stroke-width: 1.8;
    fill: none;
    flex-shrink: 0;
  }

  .send-code {
    background: var(--text);
    color: var(--bg);
    border: none;
    border-radius: 12px;
    padding: 14px 16px;
    font-family: inherit;
    font-size: 15px;
    font-weight: 600;
    letter-spacing: -0.01em;
    cursor: pointer;
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 8px;
  }

  .send-code svg {
    width: 14px;
    height: 14px;
    stroke: var(--bg);
    stroke-width: 2;
    fill: none;
  }

  .legal {
    font-size: 12px;
    color: var(--text-muted);
    line-height: 1.5;
    letter-spacing: -0.005em;
    text-align: center;
  }

  .legal a {
    color: var(--text);
    text-decoration: underline;
    text-decoration-color: var(--text-soft);
    text-underline-offset: 2px;
  }

  /* OTP screen */
  .top-bar {
    padding: 8px 16px;
    display: flex;
    align-items: center;
    flex-shrink: 0;
  }

  .back-btn {
    width: 40px;
    height: 40px;
    border-radius: 50%;
    background: var(--surface);
    border: none;
    display: flex;
    align-items: center;
    justify-content: center;
    cursor: pointer;
  }

  .back-btn svg {
    width: 16px;
    height: 16px;
    stroke: var(--text);
    stroke-width: 1.8;
    fill: none;
  }

  .otp-hero {
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 16px;
    padding: 16px 0 8px;
  }

  .otp-mascot {
    width: 56px;
    height: 56px;
  }

  .otp-title {
    font-size: 26px;
    font-weight: 700;
    color: var(--text);
    letter-spacing: -0.025em;
    line-height: 1.1;
    text-align: center;
  }

  .otp-subtitle {
    font-size: 14px;
    color: var(--text-muted);
    letter-spacing: -0.005em;
    line-height: 1.5;
    text-align: center;
    max-width: 280px;
  }

  .otp-subtitle strong {
    color: var(--text);
    font-weight: 600;
  }

  .otp-inputs {
    display: flex;
    justify-content: center;
    gap: 8px;
    margin-top: 16px;
  }

  .otp-box {
    width: 44px;
    height: 56px;
    background: var(--surface);
    border: 1.5px solid transparent;
    border-radius: 12px;
    font-family: inherit;
    font-size: 22px;
    font-weight: 600;
    color: var(--text);
    text-align: center;
    outline: none;
    letter-spacing: -0.01em;
    transition: border-color 160ms, background 160ms;
  }

  .otp-box:focus,
  .otp-box.active {
    background: var(--bg);
    border-color: var(--text);
  }

  .otp-box.filled {
    background: var(--surface);
    border-color: var(--surface-2);
  }

  .otp-footer {
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 14px;
    margin-top: 8px;
  }

  .resend-text {
    font-size: 13px;
    color: var(--text-muted);
    letter-spacing: -0.005em;
  }

  .resend-text .countdown {
    color: var(--text);
    font-weight: 600;
  }

  .resend-text a {
    color: var(--text);
    text-decoration: underline;
    text-decoration-color: var(--text-soft);
    text-underline-offset: 2px;
    font-weight: 600;
  }

  .change-link {
    font-size: 13px;
    color: var(--text-muted);
    letter-spacing: -0.005em;
  }

  .change-link a {
    color: var(--text);
    text-decoration: underline;
    text-decoration-color: var(--text-soft);
    text-underline-offset: 2px;
  }

  .home-indicator {
    width: 134px;
    height: 5px;
    background: var(--text);
    border-radius: 3px;
    margin: 12px auto 8px;
    flex-shrink: 0;
  }
</style>
</head>
<body>

<div class="phone">

  <div class="status-bar">
    <span>9:41</span>
    <div class="status-right">
      <svg width="17" height="11" viewBox="0 0 17 11" fill="currentColor"><path d="M1 7h2v3H1zM5 5h2v5H5zM9 3h2v7H9zM13 1h2v9h-2z"/></svg>
      <svg width="15" height="11" viewBox="0 0 15 11" fill="currentColor"><path d="M7.5 2C9.7 2 11.7 2.8 13.3 4.2L14.5 3C12.6 1.2 10.1.2 7.5.2S2.4 1.2.5 3l1.2 1.2C3.3 2.8 5.3 2 7.5 2zM7.5 5.5c1.4 0 2.7.5 3.7 1.4l1.2-1.2c-1.4-1.3-3.2-2-5-2s-3.6.7-5 2l1.2 1.2c1-.9 2.3-1.4 3.7-1.4z"/></svg>
      <svg width="24" height="11" viewBox="0 0 24 11" fill="none"><rect x="0.5" y="0.5" width="20" height="10" rx="2.5" stroke="currentColor"/><rect x="2" y="2" width="17" height="7" rx="1" fill="currentColor"/><rect x="21" y="3.5" width="1.5" height="4" rx="0.5" fill="currentColor"/></svg>
    </div>
  </div>

  <div class="top-bar">
    <button class="back-btn" aria-label="Back">
      <svg viewBox="0 0 24 24"><polyline points="15 6 9 12 15 18"/></svg>
    </button>
  </div>

  <div class="scroll">

    <div class="otp-hero">
      <svg class="otp-mascot" viewBox="0 0 64 64" xmlns="http://www.w3.org/2000/svg">
        <ellipse cx="32" cy="38" rx="20" ry="20" fill="#D4B891"/>
        <ellipse cx="32" cy="42" rx="13" ry="13" fill="#F5EBD3"/>
        <ellipse cx="13" cy="34" rx="3.5" ry="6" fill="#A89070" transform="rotate(-25 13 34)"/>
        <ellipse cx="51" cy="34" rx="3.5" ry="6" fill="#A89070" transform="rotate(25 51 34)"/>
        <ellipse cx="22" cy="36" rx="3" ry="2" fill="#E8B894" opacity="0.6"/>
        <ellipse cx="42" cy="36" rx="3" ry="2" fill="#E8B894" opacity="0.6"/>
        <circle cx="25" cy="30" r="3.5" fill="white"/>
        <circle cx="39" cy="30" r="3.5" fill="white"/>
        <circle cx="25" cy="30" r="1.7" fill="#1A1A1A"/>
        <circle cx="39" cy="30" r="1.7" fill="#1A1A1A"/>
        <path d="M30 33 L34 33 L32 36 Z" fill="#C87A4A"/>
        <path d="M30 14 Q32 10 34 14" stroke="#8B7355" stroke-width="1.6" fill="none" stroke-linecap="round"/>
      </svg>
      <h1 class="otp-title">check your email</h1>
      <p class="otp-subtitle">sent a 6-digit code to <strong>saher@kebi.app</strong></p>
    </div>

    <div class="otp-inputs">
      <input class="otp-box filled" inputmode="numeric" maxlength="1" value="4" />
      <input class="otp-box filled" inputmode="numeric" maxlength="1" value="9" />
      <input class="otp-box filled" inputmode="numeric" maxlength="1" value="2" />
      <input class="otp-box active" inputmode="numeric" maxlength="1" value="" />
      <input class="otp-box" inputmode="numeric" maxlength="1" value="" />
      <input class="otp-box" inputmode="numeric" maxlength="1" value="" />
    </div>

    <div class="otp-footer">
      <div class="resend-text">
        didn't get it? resend in <span class="countdown">0:42</span>
      </div>
      <div class="change-link">
        wrong email? <a href="#">change it</a>
      </div>
    </div>

  </div>

  <div class="home-indicator"></div>

</div>

</body>
</html>
