<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Kebi · Place-source icons</title>
<style>
  .theme {
    --bg: #FAFAF9; --surface: #F1F1EF; --surface-2: #E8E8E5;
    --text: #1A1A1A; --text-muted: #8A8A87; --text-soft: #B5B5B1;
  }
  .theme.dark {
    --bg: #13110F; --surface: #1C1A17; --surface-2: #26231F;
    --text: #F5F1EA; --text-muted: #9A938A; --text-soft: #6E6862;
  }
  * { box-sizing: border-box; }
  body {
    margin: 0; font-family: 'Inter', system-ui, sans-serif;
    background: #d9d9d6; padding: 32px; display: flex; gap: 28px;
    flex-wrap: wrap; align-items: flex-start;
  }
  .theme {
    background: var(--bg); color: var(--text); width: 440px;
    border-radius: 28px; padding: 24px 22px 28px;
    box-shadow: 0 8px 40px rgba(0,0,0,.18);
  }
  h1 { font-size: 17px; margin: 0 0 2px; letter-spacing: -0.01em; }
  .scheme { font-size: 12px; color: var(--text-muted); margin-bottom: 18px; }
  h2 {
    font-size: 11px; text-transform: uppercase; letter-spacing: .08em;
    color: var(--text-muted); margin: 22px 0 8px; font-weight: 600;
  }

  /* the source line as it renders on a library card */
  .src {
    display: flex; align-items: center; gap: 10px; padding: 9px 2px;
    border-bottom: 1px solid var(--surface-2);
  }
  .src:last-child { border-bottom: none; }
  .src svg { width: 15px; height: 15px; flex: none; color: var(--text-muted); }
  .src svg.mascot { width: 18px; height: 18px; }
  .src .txt { font-size: 13px; color: var(--text-muted); }
  .src .key {
    margin-left: auto; font-family: 'SF Mono', Menlo, monospace;
    font-size: 10px; color: var(--text-soft);
  }

  .cmp { display: flex; align-items: center; gap: 22px; padding: 8px 2px; }
  .cmp .col { display: flex; align-items: center; gap: 9px; }
  .cmp .lab { font-size: 11px; color: var(--text-soft); width: 34px; }
  .cmp svg { width: 16px; height: 16px; color: var(--text-muted); }
  .note { font-size: 11px; color: var(--text-soft); margin-top: 16px; line-height: 1.5; }
</style>
</head>
<body>

  <div>

    <div class="cmp">

    <p class="note">
      Brand logos (TikTok / Instagram / YouTube) come from the canonical
      single-colour marks, tinted with <code>--text-muted</code> like every
      source line. Maps-list keeps a pin, manual a pencil. <b>kebi</b> uses the
      actual mascot art (&lt;Mascot/&gt;) and keeps its own warm palette in both
      themes, since it's our brand; the other glyphs stay monochrome.
    </p>

</template>

<div class="theme" id="light"></div>
<div class="theme dark" id="dark"></div>

<script>
  const tpl = document.getElementById('panel').content;
  for (const [id, label] of [['light','light'], ['dark','dark']]) {
    const node = tpl.cloneNode(true);
    node.querySelector('.scheme').textContent = label;
    document.getElementById(id).appendChild(node);
  }
</script>
</body>
</html>
