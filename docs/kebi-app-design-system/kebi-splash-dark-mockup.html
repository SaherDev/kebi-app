<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Kebi Splash — Animated</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --bg: #13110F;
    --surface: #1C1A17;
    --text: #F5F1EA;
    --text-muted: #9A938A;
    --text-soft: #6E6862;
  }

  html, body {
    background: #0A0908;
    font-family: 'Inter', system-ui, sans-serif;
    -webkit-font-smoothing: antialiased;
    min-height: 100vh;
    display: flex;
    align-items: center;
    justify-content: center;
    padding: 40px 16px;
  }

  .phone {
    width: 390px;
    height: 844px;
    background: var(--bg);
    border-radius: 48px;
    overflow: hidden;
    position: relative;
    box-shadow: 0 0 0 12px #000, 0 0 0 14px #0A0908, 0 40px 80px rgba(0,0,0,0.5);
    display: flex;
    flex-direction: column;
  }

  .status-bar {
    height: 50px;
    padding: 18px 32px 0;
    display: flex;
    justify-content: space-between;
    align-items: center;
    font-size: 15px;
    font-weight: 600;
    color: var(--text);
    flex-shrink: 0;
    z-index: 2;
  }

  .status-right { display: flex; gap: 6px; align-items: center; }

  /* Splash canvas */
  .splash {
    position: absolute;
    inset: 0;
    background: var(--bg);
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    gap: 22px;
    overflow: hidden;
  }

  /* Mascot stage — entrance fade + tiny float loop after */
  .mascot-stage {
    position: relative;
    width: 140px;
    height: 140px;
    display: flex;
    align-items: center;
    justify-content: center;
  }

  .mascot {
    width: 140px;
    height: 140px;
    opacity: 0;
    transform: translateY(8px) scale(0.92);
    animation:
      mascot-in 700ms cubic-bezier(0.34, 1.56, 0.64, 1) 200ms forwards,
      mascot-float 3.6s ease-in-out 1100ms infinite;
  }

  /* Subtle radial halo behind mascot */
  .halo {
    position: absolute;
    inset: -20px;
    border-radius: 50%;
    background: radial-gradient(circle at 50% 50%, rgba(242, 235, 219, 0.10) 0%, rgba(242, 235, 219, 0) 65%);
    opacity: 0;
    animation: halo-in 900ms ease-out 300ms forwards;
    z-index: 0;
  }

  /* Belly mark wobble — happens once after entrance */
  .belly-mark {
    transform-origin: center;
    animation: belly-wobble 600ms ease-out 1100ms 1;
  }

  /* Eyes blink loop */
  .eye-pupil {
    transform-origin: center;
    animation: blink 5s ease-in-out 2200ms infinite;
  }

  /* Wordmark — typewriter reveal */
  .wordmark {
    font-size: 28px;
    font-weight: 800;
    color: var(--text);
    letter-spacing: -0.04em;
    line-height: 1;
    overflow: hidden;
    white-space: nowrap;
    max-width: 0;
    animation: type 700ms steps(6, end) 900ms forwards;
    border-right: 2px solid var(--text);
    animation-fill-mode: forwards;
  }

  .wordmark.done {
    border-right-color: transparent;
  }

  /* Tagline fades in late, lowercase Gen Z voice */
  .tagline {
    font-size: 14px;
    color: var(--text-muted);
    letter-spacing: -0.005em;
    opacity: 0;
    transform: translateY(4px);
    animation: tagline-in 500ms ease-out 1700ms forwards;
  }

  /* Loading dots — subtle, reads as "booting" */
  .loading {
    position: absolute;
    bottom: 80px;
    left: 50%;
    transform: translateX(-50%);
    display: flex;
    gap: 6px;
    opacity: 0;
    animation: loading-in 400ms ease-out 2200ms forwards;
  }

  .loading .dot {
    width: 5px;
    height: 5px;
    border-radius: 50%;
    background: var(--text-soft);
    animation: dot-pulse 1.4s ease-in-out infinite;
  }

  .loading .dot:nth-child(2) { animation-delay: 0.18s; }
  .loading .dot:nth-child(3) { animation-delay: 0.36s; }

  /* Home indicator stays visible */
  .home-indicator {
    position: absolute;
    bottom: 8px;
    left: 50%;
    transform: translateX(-50%);
    width: 134px;
    height: 5px;
    background: var(--text);
    border-radius: 3px;
    z-index: 2;
  }

  /* Animations */
  @keyframes mascot-in {
    to {
      opacity: 1;
      transform: translateY(0) scale(1);
    }
  }

  @keyframes mascot-float {
    0%, 100% { transform: translateY(0) scale(1); }
    50% { transform: translateY(-4px) scale(1); }
  }

  @keyframes halo-in {
    to { opacity: 1; }
  }

  @keyframes belly-wobble {
    0% { transform: rotate(0); }
    25% { transform: rotate(-3deg); }
    75% { transform: rotate(3deg); }
    100% { transform: rotate(0); }
  }

  @keyframes blink {
    0%, 92%, 96%, 100% { transform: scaleY(1); }
    94% { transform: scaleY(0.1); }
  }

  @keyframes type {
    to { max-width: 6.5ch; }
  }

  @keyframes tagline-in {
    to { opacity: 1; transform: translateY(0); }
  }

  @keyframes loading-in {
    to { opacity: 1; }
  }

  @keyframes dot-pulse {
    0%, 100% { opacity: 0.3; transform: translateY(0); }
    50% { opacity: 1; transform: translateY(-2px); }
  }

  /* Optional: trigger transition out — applied via JS class to fade splash out */
  .splash.out {
    animation: splash-out 400ms ease-out forwards;
  }

  @keyframes splash-out {
    to {
      opacity: 0;
      transform: scale(1.04);
    }
  }
</style>
</head>
<body>

<div class="phone">
  <div class="status-bar">
    <span>9:41</span>
    <div class="status-right">
      <svg width="17" height="11" viewBox="0 0 17 11" fill="currentColor"><path d="M1 7h2v3H1zM5 5h2v5H5zM9 3h2v7H9zM13 1h2v9h-2z"/></svg>
      <svg width="15" height="11" viewBox="0 0 15 11" fill="currentColor"><path d="M7.5 2C9.7 2 11.7 2.8 13.3 4.2L14.5 3C12.6 1.2 10.1.2 7.5.2S2.4 1.2.5 3l1.2 1.2C3.3 2.8 5.3 2 7.5 2zM7.5 5.5c1.4 0 2.7.5 3.7 1.4l1.2-1.2c-1.4-1.3-3.2-2-5-2s-3.6.7-5 2l1.2 1.2c1-.9 2.3-1.4 3.7-1.4z"/></svg>
      <svg width="24" height="11" viewBox="0 0 24 11" fill="none"><rect x="0.5" y="0.5" width="20" height="10" rx="2.5" stroke="currentColor"/><rect x="2" y="2" width="17" height="7" rx="1" fill="currentColor"/><rect x="21" y="3.5" width="1.5" height="4" rx="0.5" fill="currentColor"/></svg>
    </div>
  </div>

  <div class="splash" id="splash">

    <div class="mascot-stage">
      <div class="halo"></div>
      <svg class="mascot" viewBox="0 0 64 64" xmlns="http://www.w3.org/2000/svg">
        <ellipse cx="32" cy="38" rx="20" ry="20" fill="#D4B891"/>
        <ellipse cx="32" cy="42" rx="13" ry="13" fill="#F5EBD3"/>
        <ellipse cx="13" cy="34" rx="3.5" ry="6" fill="#A89070" transform="rotate(-25 13 34)"/>
        <ellipse cx="51" cy="34" rx="3.5" ry="6" fill="#A89070" transform="rotate(25 51 34)"/>
        <ellipse cx="22" cy="36" rx="3" ry="2" fill="#E8B894" opacity="0.6"/>
        <ellipse cx="42" cy="36" rx="3" ry="2" fill="#E8B894" opacity="0.6"/>
        <circle cx="25" cy="30" r="3.5" fill="white"/>
        <circle cx="39" cy="30" r="3.5" fill="white"/>
        <circle cx="25" cy="30" r="1.7" fill="#1A1A1A"/>
        <circle cx="39" cy="30" r="1.7" fill="#1A1A1A"/>
        <circle cx="25.6" cy="29.4" r="0.6" fill="white"/>
        <circle cx="39.6" cy="29.4" r="0.6" fill="white"/>
        <path d="M30 33 L34 33 L32 36 Z" fill="#C87A4A"/>
        <path d="M30 14 Q32 10 34 14" stroke="#8B7355" stroke-width="1.6" fill="none" stroke-linecap="round"/>
      </svg>
    </div>

    <div class="wordmark" id="wordmark">Kebi</div>
    <div class="tagline">your place guy</div>

    <div class="loading">
      <span class="dot"></span>
      <span class="dot"></span>
      <span class="dot"></span>
    </div>

    <div class="home-indicator"></div>
  </div>
</div>

<script>
  // Cursor disappears once typing finishes
  setTimeout(() => {
    document.getElementById('wordmark').classList.add('done');
  }, 1700);

  // Optional: simulate boot complete and fade out splash
  // Comment this out to keep the splash on screen for the screenshot
  // setTimeout(() => {
  //   document.getElementById('splash').classList.add('out');
  // }, 3200);
</script>

</body>
</html>
