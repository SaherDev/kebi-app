<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Kebi Toast Notifications</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --bg: #13110F;
    --surface: #1C1A17;
    --surface-2: #26231F;
    --text: #F5F1EA;
    --text-muted: #9A938A;
    --text-soft: #6E6862;
    --success: #A8C293;
    --like: #E8B894;
    --warn: #E5C078;
    --danger: #E89090;
    --toast-bg: #F5F1EA;
    --toast-text: #1A1A1A;
    --toast-muted: rgba(26, 26, 26, 0.5);
  }

  html, body {
    background: #0A0908;
    font-family: 'Inter', system-ui, sans-serif;
    -webkit-font-smoothing: antialiased;
    min-height: 100vh;
    display: flex;
    align-items: center;
    justify-content: center;
    padding: 40px 16px;
  }

  .phone {
    width: 390px;
    height: 844px;
    background: var(--bg);
    border-radius: 48px;
    overflow: hidden;
    position: relative;
    box-shadow: 0 0 0 12px #000, 0 0 0 14px #0A0908, 0 40px 80px rgba(0,0,0,0.5);
    display: flex;
    flex-direction: column;
  }

  .status-bar {
    height: 50px;
    padding: 18px 32px 0;
    display: flex;
    justify-content: space-between;
    align-items: center;
    font-size: 15px;
    font-weight: 600;
    color: var(--text);
    flex-shrink: 0;
  }

  .status-right { display: flex; gap: 6px; align-items: center; }

  .top-bar {
    padding: 12px 16px 8px;
    display: flex;
    justify-content: space-between;
    align-items: center;
    flex-shrink: 0;
  }

  .icon-btn {
    width: 40px;
    height: 40px;
    border-radius: 50%;
    background: var(--surface);
    display: flex;
    align-items: center;
    justify-content: center;
    border: none;
    cursor: pointer;
  }

  .icon-btn svg {
    width: 18px;
    height: 18px;
    stroke: var(--text);
    stroke-width: 1.8;
    fill: none;
  }

  .top-pill {
    display: flex;
    align-items: center;
    background: var(--surface);
    border-radius: 999px;
    padding: 0 4px;
  }

  .top-pill button {
    width: 40px;
    height: 40px;
    border-radius: 50%;
    background: transparent;
    border: none;
    display: flex;
    align-items: center;
    justify-content: center;
    cursor: pointer;
  }

  .top-pill svg {
    width: 18px;
    height: 18px;
    stroke: var(--text);
    stroke-width: 1.8;
    fill: none;
  }

  .scroll {
    flex: 1;
    overflow-y: auto;
    padding: 8px 24px 24px;
    display: flex;
    flex-direction: column;
    gap: 24px;
  }

  .scroll::-webkit-scrollbar { display: none; }

  .turn {
    display: flex;
    flex-direction: column;
    gap: 8px;
  }

  .turn-label {
    font-size: 11px;
    font-weight: 600;
    color: var(--text-soft);
    text-transform: uppercase;
    letter-spacing: 0.08em;
  }

  .hero {
    font-size: 32px;
    font-weight: 700;
    color: var(--text);
    letter-spacing: -0.03em;
    line-height: 1.05;
    margin-top: 4px;
  }

  .hero-sub {
    font-size: 14px;
    color: var(--text-muted);
    letter-spacing: -0.005em;
    line-height: 1.5;
    margin-top: 4px;
  }

  /* Trigger buttons — list of demo actions */
  .trigger-list {
    display: flex;
    flex-direction: column;
    gap: 4px;
    background: var(--surface);
    border-radius: 14px;
    padding: 4px;
  }

  .trigger {
    display: flex;
    align-items: center;
    gap: 12px;
    padding: 12px;
    cursor: pointer;
    border-radius: 10px;
    transition: background 120ms;
    background: transparent;
    border: none;
    width: 100%;
    text-align: left;
    font-family: inherit;
  }

  .trigger:hover { background: var(--bg); }

  .trigger + .trigger { border-top: 1px solid var(--surface-2); }

  .trigger-icon {
    width: 32px;
    height: 32px;
    border-radius: 8px;
    background: var(--surface-2);
    display: flex;
    align-items: center;
    justify-content: center;
    flex-shrink: 0;
    font-size: 14px;
  }

  .trigger-icon.danger { background: #3A1818; }
  .trigger-icon.success { background: #1F2E1A; }
  .trigger-icon.warm { background: #3A1F12; }

  .trigger-icon svg {
    width: 14px;
    height: 14px;
    stroke: var(--text);
    stroke-width: 1.8;
    fill: none;
  }

  .trigger-icon.danger svg { stroke: var(--danger); }
  .trigger-icon.success svg { stroke: var(--success); }
  .trigger-icon.warm svg { stroke: var(--like); }

  .trigger-body {
    flex: 1;
    min-width: 0;
    display: flex;
    flex-direction: column;
    gap: 1px;
  }

  .trigger-label {
    font-size: 14px;
    font-weight: 500;
    color: var(--text);
    letter-spacing: -0.005em;
  }

  .trigger-sublabel {
    font-size: 12px;
    color: var(--text-muted);
    letter-spacing: -0.005em;
  }

  /* Toast container — positioned above the AI button */
  .toast-stack {
    position: absolute;
    bottom: 92px;
    left: 16px;
    right: 16px;
    display: flex;
    flex-direction: column;
    gap: 8px;
    align-items: center;
    pointer-events: none;
    z-index: 50;
  }

  .toast {
    background: var(--toast-bg);
    color: var(--toast-text);
    border-radius: 14px;
    padding: 10px 14px;
    display: flex;
    align-items: center;
    gap: 10px;
    font-family: inherit;
    box-shadow: 0 8px 24px rgba(0, 0, 0, 0.18), 0 2px 6px rgba(0, 0, 0, 0.12);
    pointer-events: auto;
    opacity: 0;
    transform: translateY(12px) scale(0.96);
    animation: toast-in 280ms cubic-bezier(0.34, 1.56, 0.64, 1) forwards;
    max-width: 100%;
    min-width: 200px;
  }

  .toast.out {
    animation: toast-out 200ms ease-in forwards;
  }

  .toast-icon {
    width: 22px;
    height: 22px;
    border-radius: 50%;
    flex-shrink: 0;
    display: flex;
    align-items: center;
    justify-content: center;
  }

  .toast-icon.success {
    background: #DCEAD3;
  }
  .toast-icon.success svg {
    stroke: #4A7C3A;
  }

  .toast-icon.warm {
    background: #FBE0CE;
  }
  .toast-icon.warm svg {
    stroke: #C2410C;
  }

  .toast-icon.danger {
    background: #FCDEDE;
  }
  .toast-icon.danger svg {
    stroke: #D14343;
  }

  .toast-icon.neutral {
    background: rgba(26, 26, 26, 0.08);
  }
  .toast-icon.neutral svg {
    stroke: var(--toast-text);
  }

  .toast-icon svg {
    width: 12px;
    height: 12px;
    stroke-width: 2.2;
    fill: none;
  }

  .toast-emoji {
    font-size: 18px;
    line-height: 1;
    flex-shrink: 0;
  }

  .toast-text {
    flex: 1;
    font-size: 13px;
    font-weight: 500;
    color: var(--toast-text);
    letter-spacing: -0.005em;
    line-height: 1.4;
    min-width: 0;
  }

  .toast-text strong {
    font-weight: 600;
  }

  .toast-action {
    background: transparent;
    border: none;
    color: var(--toast-text);
    font-family: inherit;
    font-size: 13px;
    font-weight: 600;
    padding: 4px 10px;
    border-radius: 8px;
    cursor: pointer;
    flex-shrink: 0;
    transition: background 120ms;
  }

  .toast-action:hover {
    background: rgba(26, 26, 26, 0.06);
  }

  .toast-close {
    background: transparent;
    border: none;
    width: 22px;
    height: 22px;
    border-radius: 50%;
    display: flex;
    align-items: center;
    justify-content: center;
    cursor: pointer;
    flex-shrink: 0;
    margin-left: -4px;
  }

  .toast-close svg {
    width: 11px;
    height: 11px;
    stroke: var(--toast-muted);
    stroke-width: 2.2;
    fill: none;
  }

  .toast-close:hover svg { stroke: var(--toast-text); }

  /* Bottom AI button */
  .tab-bar {
    margin: 8px 16px 12px;
    display: flex;
    align-items: center;
    justify-content: flex-end;
    flex-shrink: 0;
  }

  .kebi-ai-btn {
    width: 56px;
    height: 56px;
    border-radius: 50%;
    background: var(--text);
    border: none;
    display: flex;
    align-items: center;
    justify-content: center;
    cursor: pointer;
  }

  .kebi-ai-btn svg {
    width: 36px;
    height: 36px;
  }

  .home-indicator {
    width: 134px;
    height: 5px;
    background: var(--text);
    border-radius: 3px;
    margin: 4px auto 8px;
    flex-shrink: 0;
  }

  /* Animations */
  @keyframes toast-in {
    to {
      opacity: 1;
      transform: translateY(0) scale(1);
    }
  }

  @keyframes toast-out {
    to {
      opacity: 0;
      transform: translateY(8px) scale(0.96);
    }
  }
</style>
</head>
<body>

<div class="phone">

  <div class="status-bar">
    <span>9:41</span>
    <div class="status-right">
      <svg width="17" height="11" viewBox="0 0 17 11" fill="currentColor"><path d="M1 7h2v3H1zM5 5h2v5H5zM9 3h2v7H9zM13 1h2v9h-2z"/></svg>
      <svg width="15" height="11" viewBox="0 0 15 11" fill="currentColor"><path d="M7.5 2C9.7 2 11.7 2.8 13.3 4.2L14.5 3C12.6 1.2 10.1.2 7.5.2S2.4 1.2.5 3l1.2 1.2C3.3 2.8 5.3 2 7.5 2zM7.5 5.5c1.4 0 2.7.5 3.7 1.4l1.2-1.2c-1.4-1.3-3.2-2-5-2s-3.6.7-5 2l1.2 1.2c1-.9 2.3-1.4 3.7-1.4z"/></svg>
      <svg width="24" height="11" viewBox="0 0 24 11" fill="none"><rect x="0.5" y="0.5" width="20" height="10" rx="2.5" stroke="currentColor"/><rect x="2" y="2" width="17" height="7" rx="1" fill="currentColor"/><rect x="21" y="3.5" width="1.5" height="4" rx="0.5" fill="currentColor"/></svg>
    </div>
  </div>

  <div class="top-bar">
    <button class="icon-btn" aria-label="Back">
      <svg viewBox="0 0 24 24"><polyline points="15 6 9 12 15 18"/></svg>
    </button>
    <div class="top-pill">
      <button aria-label="More">
        <svg viewBox="0 0 24 24"><circle cx="5" cy="12" r="1.5" fill="currentColor"/><circle cx="12" cy="12" r="1.5" fill="currentColor"/><circle cx="19" cy="12" r="1.5" fill="currentColor"/></svg>
      </button>
    </div>
  </div>

  <div class="scroll">

    <div class="turn">
      <div class="turn-label">notifications</div>
      <h1 class="hero">toasts</h1>
      <p class="hero-sub">tap any row to fire the matching toast. they stack, auto-dismiss, and sit above the AI button.</p>
    </div>

    <div class="trigger-list">

      <button class="trigger" data-toast="saved">
        <span class="trigger-icon success">
          <svg viewBox="0 0 24 24"><polyline points="20 6 9 17 4 12"/></svg>
        </span>
        <span class="trigger-body">
          <span class="trigger-label">save a place</span>
          <span class="trigger-sublabel">simple confirmation, no undo</span>
        </span>
      </button>

      <button class="trigger" data-toast="copied">
        <span class="trigger-icon">
          <svg viewBox="0 0 24 24"><rect x="9" y="9" width="13" height="13" rx="2"/><path d="M5 15H4a2 2 0 01-2-2V4a2 2 0 012-2h9a2 2 0 012 2v1"/></svg>
        </span>
        <span class="trigger-body">
          <span class="trigger-label">copy link</span>
          <span class="trigger-sublabel">neutral icon, auto dismiss</span>
        </span>
      </button>

      <button class="trigger" data-toast="approved">
        <span class="trigger-icon warm">
          <svg viewBox="0 0 24 24"><polygon points="12 2 15.09 8.26 22 9.27 17 14.14 18.18 21.02 12 17.77 5.82 21.02 7 14.14 2 9.27 8.91 8.26 12 2"/></svg>
        </span>
        <span class="trigger-body">
          <span class="trigger-label">approve a place</span>
          <span class="trigger-sublabel">action with undo</span>
        </span>
      </button>

      <button class="trigger" data-toast="went">
        <span class="trigger-icon success">
          <svg viewBox="0 0 24 24"><path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/><circle cx="12" cy="12" r="3"/></svg>
        </span>
        <span class="trigger-body">
          <span class="trigger-label">mark as been</span>
          <span class="trigger-sublabel">action with undo</span>
        </span>
      </button>

      <button class="trigger" data-toast="removed">
        <span class="trigger-icon danger">
          <svg viewBox="0 0 24 24"><polyline points="3 6 5 6 21 6"/><path d="M19 6l-1 14a2 2 0 01-2 2H8a2 2 0 01-2-2L5 6"/></svg>
        </span>
        <span class="trigger-body">
          <span class="trigger-label">remove a place</span>
          <span class="trigger-sublabel">destructive, undo critical</span>
        </span>
      </button>

      <button class="trigger" data-toast="error">
        <span class="trigger-icon danger">
          <svg viewBox="0 0 24 24"><circle cx="12" cy="12" r="10"/><line x1="12" y1="8" x2="12" y2="12"/><line x1="12" y1="16" x2="12.01" y2="16"/></svg>
        </span>
        <span class="trigger-body">
          <span class="trigger-label">save fails</span>
          <span class="trigger-sublabel">error variant with retry</span>
        </span>
      </button>

      <button class="trigger" data-toast="multi">
        <span class="trigger-icon">
          <svg viewBox="0 0 24 24"><rect x="3" y="3" width="7" height="7"/><rect x="14" y="3" width="7" height="7"/><rect x="3" y="14" width="7" height="7"/><rect x="14" y="14" width="7" height="7"/></svg>
        </span>
        <span class="trigger-body">
          <span class="trigger-label">stacked toasts</span>
          <span class="trigger-sublabel">trigger 3 in a row</span>
        </span>
      </button>

    </div>

  </div>

  <div class="tab-bar">
    <button class="kebi-ai-btn" aria-label="Ask Kebi">
      <svg viewBox="0 0 64 64" xmlns="http://www.w3.org/2000/svg">
        <ellipse cx="32" cy="38" rx="20" ry="20" fill="#D4B891"/>
        <ellipse cx="32" cy="42" rx="13" ry="13" fill="#F5EBD3"/>
        <ellipse cx="13" cy="34" rx="3.5" ry="6" fill="#A89070" transform="rotate(-25 13 34)"/>
        <ellipse cx="51" cy="34" rx="3.5" ry="6" fill="#A89070" transform="rotate(25 51 34)"/>
        <ellipse cx="22" cy="36" rx="3" ry="2" fill="#E8B894" opacity="0.6"/>
        <ellipse cx="42" cy="36" rx="3" ry="2" fill="#E8B894" opacity="0.6"/>
        <circle cx="25" cy="30" r="3.5" fill="white"/>
        <circle cx="39" cy="30" r="3.5" fill="white"/>
        <circle cx="25" cy="30" r="1.7" fill="#1A1A1A"/>
        <circle cx="39" cy="30" r="1.7" fill="#1A1A1A"/>
        <circle cx="25.6" cy="29.4" r="0.6" fill="white"/>
        <circle cx="39.6" cy="29.4" r="0.6" fill="white"/>
        <path d="M30 33 L34 33 L32 36 Z" fill="#C87A4A"/>
        <path d="M30 14 Q32 10 34 14" stroke="#8B7355" stroke-width="1.6" fill="none" stroke-linecap="round"/>
      </svg>
    </button>
  </div>

  <!-- Toast stack — preview filled with all variants for the spec screenshot -->
  <div class="toast-stack" id="toast-stack">

    <div class="toast">
      <span class="toast-icon success">
        <svg viewBox="0 0 24 24"><polyline points="5 12 10 17 19 7"/></svg>
      </span>
      <span class="toast-text">saved <strong>Saint Jardim</strong> to your stash</span>
      <button class="toast-close" aria-label="Close">
        <svg viewBox="0 0 24 24"><line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/></svg>
      </button>
    </div>

    <div class="toast">
      <span class="toast-icon neutral">
        <svg viewBox="0 0 24 24"><rect x="9" y="9" width="13" height="13" rx="2"/><path d="M5 15H4a2 2 0 01-2-2V4a2 2 0 012-2h9a2 2 0 012 2v1"/></svg>
      </span>
      <span class="toast-text">link copied</span>
      <button class="toast-close" aria-label="Close">
        <svg viewBox="0 0 24 24"><line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/></svg>
      </button>
    </div>

    <div class="toast">
      <span class="toast-emoji">🌟</span>
      <span class="toast-text">approved <strong>Saint Jardim</strong></span>
      <button class="toast-action">undo</button>
    </div>

    <div class="toast">
      <span class="toast-icon success">
        <svg viewBox="0 0 24 24"><polyline points="5 12 10 17 19 7"/></svg>
      </span>
      <span class="toast-text">marked <strong>Kamachiku</strong> as been</span>
      <button class="toast-action">undo</button>
    </div>

    <div class="toast">
      <span class="toast-icon danger">
        <svg viewBox="0 0 24 24"><polyline points="3 6 5 6 21 6"/><path d="M19 6l-1 14a2 2 0 01-2 2H8a2 2 0 01-2-2L5 6"/></svg>
      </span>
      <span class="toast-text"><strong>Bar Trench</strong> removed</span>
      <button class="toast-action">undo</button>
    </div>

    <div class="toast">
      <span class="toast-icon danger">
        <svg viewBox="0 0 24 24"><circle cx="12" cy="12" r="10"/><line x1="12" y1="8" x2="12" y2="12"/><line x1="12" y1="16" x2="12.01" y2="16"/></svg>
      </span>
      <span class="toast-text">couldn't save that one</span>
      <button class="toast-action">retry</button>
    </div>

  </div>

  <div class="home-indicator"></div>

</div>

<script>
  // Toast variant config
  const variants = {
    saved: {
      icon: { type: 'svg', cls: 'success', html: '<polyline points="5 12 10 17 19 7"/>' },
      text: 'saved <strong>Saint Jardim</strong> to your stash',
      timeout: 3000,
    },
    copied: {
      icon: { type: 'svg', cls: 'neutral', html: '<rect x="9" y="9" width="13" height="13" rx="2"/><path d="M5 15H4a2 2 0 01-2-2V4a2 2 0 012-2h9a2 2 0 012 2v1"/>' },
      text: 'link copied',
      timeout: 3000,
    },
    approved: {
      icon: { type: 'emoji', emoji: '🌟' },
      text: 'approved <strong>Saint Jardim</strong>',
      action: 'undo',
      timeout: 5000,
    },
    went: {
      icon: { type: 'svg', cls: 'success', html: '<polyline points="5 12 10 17 19 7"/>' },
      text: 'marked <strong>Kamachiku</strong> as been',
      action: 'undo',
      timeout: 5000,
    },
    removed: {
      icon: { type: 'svg', cls: 'danger', html: '<polyline points="3 6 5 6 21 6"/><path d="M19 6l-1 14a2 2 0 01-2 2H8a2 2 0 01-2-2L5 6"/>' },
      text: '<strong>Bar Trench</strong> removed',
      action: 'undo',
      timeout: 5000,
    },
    error: {
      icon: { type: 'svg', cls: 'danger', html: '<circle cx="12" cy="12" r="10"/><line x1="12" y1="8" x2="12" y2="12"/><line x1="12" y1="16" x2="12.01" y2="16"/>' },
      text: "couldn't save that one",
      action: 'retry',
      timeout: 5000,
    },
  };

  function makeToast(config) {
    const toast = document.createElement('div');
    toast.className = 'toast';

    let iconHtml = '';
    if (config.icon.type === 'svg') {
      iconHtml = `<span class="toast-icon ${config.icon.cls}"><svg viewBox="0 0 24 24" fill="none">${config.icon.html}</svg></span>`;
    } else {
      iconHtml = `<span class="toast-emoji">${config.icon.emoji}</span>`;
    }

    let actionHtml = '';
    if (config.action) {
      actionHtml = `<button class="toast-action">${config.action}</button>`;
    } else {
      actionHtml = `<button class="toast-close" aria-label="Close"><svg viewBox="0 0 24 24" fill="none"><line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/></svg></button>`;
    }

    toast.innerHTML = iconHtml + `<span class="toast-text">${config.text}</span>` + actionHtml;
    return toast;
  }

  function fireToast(key) {
    // Clear preview toasts on first user interaction
    const stack = document.getElementById('toast-stack');
    if (stack.dataset.preview !== 'cleared') {
      stack.innerHTML = '';
      stack.dataset.preview = 'cleared';
    }

    const config = variants[key];
    if (!config) return;

    const toast = makeToast(config);
    stack.appendChild(toast);

    const dismiss = () => {
      toast.classList.add('out');
      setTimeout(() => toast.remove(), 200);
    };

    toast.querySelector('.toast-close')?.addEventListener('click', dismiss);
    toast.querySelector('.toast-action')?.addEventListener('click', dismiss);

    setTimeout(dismiss, config.timeout);
  }

  document.querySelectorAll('.trigger').forEach(btn => {
    btn.addEventListener('click', () => {
      const t = btn.dataset.toast;
      if (t === 'multi') {
        fireToast('saved');
        setTimeout(() => fireToast('approved'), 600);
        setTimeout(() => fireToast('went'), 1200);
      } else {
        fireToast(t);
      }
    });
  });
</script>
