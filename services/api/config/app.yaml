app:
  environment: development
  port: 3333
  api_prefix: api/v1

auth:
  provider: clerk # active identity provider (registry key in AuthModule)
  user_id_prefix: user_ # typed prefix for generated internal user ids
  # Supabase verification params (consumed when provider: supabase). issuer
  # derives from SUPABASE_PROJECT_URL when omitted; audience defaults below.
  supabase:
    audience: authenticated
  public_paths:
    - /health
    - /webhooks/clerk

ai:
  enabled_default: true

rate_limits:
  default_plan: homebody
  plans:
    homebody:
      sessions_per_day: 3
      tool_calls_per_day: 30
      turns_per_session: 10
    explorer:
      sessions_per_day: 10
      tool_calls_per_day: 100
      turns_per_session: 20
    local_legend:
      sessions_per_day: 20
      tool_calls_per_day: 200
      turns_per_session: 30
